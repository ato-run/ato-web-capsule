schema_version = "0.3"
name = "ato-web-capsule"
version = "0.1.0"
type = "app"
default_target = "main"

[metadata]
# The default monochrome Ato mark — same icon the store shows for
# community-published apps without a custom icon.
store_icon = "https://ato.run/icon_bw.png"

[targets.main]
runtime = "source"
driver = "node"
runtime_version = "20"
build = "npm install && npm run build"
run = "node server/index.mjs"

[isolation]
# Store identity is configuration, not code: the same capsule serves any
# store. PORT is injected by Ato.
allow_env = [
    "PORT",
    "STORE_NAME",
    "CATALOG_MODE",
    "API_BASE",
    "APP_WEB_BASE",
    "STORE_WEB_BASE",
]

[network]
# The server proxies the catalog server-side, so the browser only ever talks
# to this capsule; the capsule itself only needs the store API.
egress_allow = [
    "localhost",
    "127.0.0.1",
    "api.ato.run",
]
